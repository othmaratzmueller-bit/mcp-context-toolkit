key: no_hardcoded_secrets
title: "No Hardcoded Secrets"
short_id: "SEC1"

type: security
scope: backend
priority: non_negotiable
modules: [all]

applies_to:
  files:
    - "src/**/*.py"
    - "app/**/*.py"
  language: python
  excludes:
    - "tests/**/*.py"
  triggers:
    - "password ="
    - "api_key ="
    - "SECRET ="

summary: |
  Never commit credentials in source. Read secrets from the environment
  or a secret manager — never as a literal in code.

content: |
  ## No Hardcoded Secrets (NON-NEGOTIABLE)

  Passwords, API keys, tokens and connection strings MUST come from the
  environment, not from source literals.

  ```python
  api_key = os.environ["SERVICE_API_KEY"]
  ```

  A leaked literal stays in git history forever — rotating the credential is
  the only remedy once it is pushed.

examples:
  forbidden:
    code: |
      api_key = "sk-live-3f9a...c21"
      db = connect("postgres://admin:hunter2@db/prod")
    why: "Credentials in source leak via git history and code sharing"
  required:
    code: |
      api_key = os.environ["SERVICE_API_KEY"]
      db = connect(os.environ["DATABASE_URL"])
    why: "Secrets resolved at runtime from the environment, never committed"

compliance_refs:
  - standard: "CWE"
    section: "CWE-798"
    description: "Use of Hard-coded Credentials"
  - standard: "OWASP ASVS"
    section: "V6.4"
    description: "Secret management — no secrets in source"

tags: [secrets, credentials, supply_chain]
created: 2026-01-01
last_reviewed: 2026-01-01
review_interval_days: 180
