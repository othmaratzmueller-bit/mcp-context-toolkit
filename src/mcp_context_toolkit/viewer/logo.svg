<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="mcp-context-toolkit">
  <!-- Mark: three connected nodes (core/project/user tiers) routed to a central hub.
       "The right context, on demand" — the hub selects which node is active.
       Fixed palette (tier colours + an accent gradient) so it reads identically
       on light and dark backgrounds — the viewer inlines this same SVG directly. -->
  <defs>
    <linearGradient id="ctx-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c9cf0"/>
      <stop offset="1" stop-color="#54c1b8"/>
    </linearGradient>
  </defs>
  <!-- edges: outer nodes → hub -->
  <g stroke="url(#ctx-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.55">
    <line x1="16" y1="16" x2="32" y2="32"/>
    <line x1="48" y1="16" x2="32" y2="32"/>
    <line x1="32" y1="50" x2="32" y2="32"/>
  </g>
  <!-- outer nodes (the three tiers) -->
  <circle cx="16" cy="16" r="6" fill="#7c9cf0"/>
  <circle cx="48" cy="16" r="6" fill="#54c1b8"/>
  <circle cx="32" cy="50" r="6" fill="#e0b15a"/>
  <!-- hub: the active selector, ringed to read as "focused" -->
  <circle cx="32" cy="32" r="8.5" fill="none" stroke="url(#ctx-grad)" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="4" fill="url(#ctx-grad)"/>
</svg>
